<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário - Sistema de Gerenciamento de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: '#1e3a8a',
                        lightblue: '#3b82f6',
                        orange: '#f97316',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="sidebar bg-darkblue text-white flex flex-col w-64">
            <div class="p-4 flex items-center border-b border-blue-800">
                <div class="bg-orange p-2 rounded-lg">
                    <i class="fas fa-boxes text-white text-xl"></i>
                </div>
                <span class="logo-text ml-3 text-xl font-bold">Senac Estoque</span>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <div class="mb-8">
                    <div class="text-xs uppercase text-blue-300 mb-4 sidebar-text">Menu Principal</div>
                    <a href="account.html" class="nav-item flex items-center py-2 px-3 rounded-lg hover:bg-blue-800 mb-2">
                        <i class="fas fa-tachometer-alt mr-3"></i>
                        <span class="sidebar-text">Dashboard</span>
                    </a>
                </div>
          
                <div>
                    <a href="profile.html" class="nav-item flex items-center py-2 px-3 rounded-lg bg-blue-900 mb-2">
                        <i class="fas fa-user-circle mr-3"></i>
                        <span class="sidebar-text">Perfil</span>
                    </a>
                </div>
            </div>
            
            <div class="p-4 border-t border-blue-800">
                <button onclick="toggleSidebar()" class="flex items-center text-blue-200 hover:text-white">
                    <i class="fas fa-chevron-left"></i>
                    <span class="sidebar-text ml-2">Recolher</span>
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-4">
                    <h1 class="text-xl font-semibold text-gray-800">Perfil do Usuário</h1>
                </div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-6 bg-gray-100">
                <div class="max-w-3xl mx-auto">
                    <!-- Profile Header -->
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6 card-hover">
                        <div class="flex flex-col md:flex-row items-center md:items-start space-y-6 md:space-y-0 md:space-x-6">
                            <div class="flex-shrink-0">
                                <div class="profile-avatar relative">
                                    <img src="https://ui-avatars.com/api/?name=User&background=1e3a8a&color=fff&size=128" 
                                         alt="User Avatar" 
                                         class="w-32 h-32 rounded-full border-4 border-white shadow-lg">
                                    <button class="edit-avatar-btn absolute bottom-0 right-0 bg-orange p-2 rounded-full text-white hover:bg-orange-600">
                                        <i class="fas fa-camera"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="flex-1 text-center md:text-left">
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">Nome de Usuário</h2>
                                <button id="btn-edit-username" class="bg-lightblue text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center">
                                    <i class="fas fa-edit mr-2"></i> Editar Nome
                                </button>
                            </div>
                            
                            <div>
                                <button id="btn-alterar-senha" class="bg-orange text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition-colors flex items-center">
                                    <i class="fas fa-key mr-2"></i> Alterar Senha
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
                        <h2 class="text-lg font-semibold mb-4">Configurações da Conta</h2>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="font-medium">Notificações por Email</p>
                                    <p class="text-sm text-gray-500">Receber atualizações por email</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="font-medium">Autenticação em Dois Fatores</p>
                                    <p class="text-sm text-gray-500">Segurança adicional para login</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Excluir Conta -->
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6 card-hover">
                        <h2 class="text-lg font-semibold mb-4">Ações da Conta</h2>
                        <button id="btn-excluir-conta" class="w-full flex items-center justify-between p-3 text-left rounded-lg hover:bg-red-50 border border-red-100 text-red-600">
                            <span class="font-medium">Excluir Conta</span>
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
